services:
  - type: web
    name: merror-api
    env: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: cd ../.. && pnpm install && pnpm --filter @merror/api build
    startCommand: node dist/main
    healthCheckPath: /api/auth/me
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: merror-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: WEB_ORIGIN
        sync: false

databases:
  - name: merror-db
    databaseName: merror_db
    user: merror
    plan: free
