services:
  - type: web
    name: merror-api
    env: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @merror/api run prisma:generate && pnpm --filter @merror/api run prisma:deploy && pnpm --filter @merror/api build
    startCommand: node dist/main
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: merror-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        value: https://merror.vercel.app

databases:
  - name: merror-db
    databaseName: merror_db
    user: merror
    plan: free
